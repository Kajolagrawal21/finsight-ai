version: "3.9"

services:

  # ─── Zookeeper (required by Kafka) ───────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finsight_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - finsight_net

  # ─── Kafka Broker ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finsight_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - finsight_net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ─── Kafka UI (free visual dashboard) ────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finsight_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finsight
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - finsight_net

  # ─── TimescaleDB (PostgreSQL + time-series superpowers) ──────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: finsight_timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: finsight_user
      POSTGRES_PASSWORD: finsight_pass
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./data/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - finsight_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight_user -d finsight"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (caching layer) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finsight_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - finsight_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Qdrant (vector DB for RAG) ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: finsight_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - finsight_net

  # ─── MLflow Tracking Server ───────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: finsight_mlflow
    command: >
      bash -c "pip install mlflow psycopg2-binary boto3 --quiet &&
               mlflow server
               --backend-store-uri postgresql://finsight_user:finsight_pass@timescaledb:5432/finsight
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5001:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - finsight_net

  # ─── Prometheus (metrics collector) ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: finsight_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - finsight_net

  # ─── Grafana (metrics dashboard) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: finsight_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: finsight123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - finsight_net

volumes:
  timescale_data:
  redis_data:
  qdrant_data:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:

networks:
  finsight_net:
    driver: bridge
